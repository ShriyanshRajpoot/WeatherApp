<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App</title>

  <style>
    *{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    transition: background .8s ease, color .3s ease;
    background-size: 200% 200%;
    animation: gradientMove 10s ease infinite;
}

.weather-card{
    width:420px;
    max-width:90%;
    border-radius:20px;
    padding:25px;
    text-align:center;
    box-shadow:0 15px 35px rgba(0,0,0,.2);
    color:white;
    transition:.4s;
    animation:cardAppear .6s ease;
    background: rgba(255,255,255,.22);
    backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,.35);
    box-shadow:0 20px 45px rgba(0,0,0,.25);
}

.weather-card:hover{
    transform:translateY(-8px);
    box-shadow:0 20px 45px rgba(0,0,0,.3);
}

.weather-card h2{
    margin-bottom:10px;
}

.default{
    background: linear-gradient(135deg,#74ebd5,#ACB6E5);
}

.clear{
    background: linear-gradient(135deg,#FFD54F,#FF8A65);
}

.clouds{
    background: linear-gradient(135deg,#7FBCD2,#A5C9EA);
}

.rain{
    background: linear-gradient(135deg,#3A7BD5,#00D2FF);
}

.thunderstorm{
    background: linear-gradient(135deg,#232526,#414345);
}

.snow{
    background: linear-gradient(135deg,#E0EAFC,#CFDEF3);
}

.mist{
    background: linear-gradient(135deg,#BDC3C7,#D7DDE8);
}

#desc{
    color:rgba(255,255,255,.9);
    margin-bottom:20px;
    text-transform:capitalize;
    font-size:18px;
}

    .details{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
    margin-top:20px;
}

.container{
    width:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.search-box{
    width:420px;
    max-width:90%;
    display:flex;
    gap:10px;
    margin-bottom:25px;
}

.search-box input{
    flex:1;
    padding:12px 15px;
    border:none;
    outline:none;
    border-radius:30px;
    font-size:16px;
    transition:.3s;
    box-shadow:0 5px 12px rgba(0,0,0,.15);
    background:white;
    color:#333;
}

.search-box input:focus{
    box-shadow:0 0 12px rgba(255,255,255,.6);
}

.search-box button{
    border:none;
    padding:12px 22px;
    border-radius:30px;
    cursor:pointer;
    background:#ff7b00;
    color:white;
    font-size:16px;
    transition:.3s;
    box-shadow: 0 8px 20px rgba(0,119,255,.35);
}

.search-box button:hover{
    background:#e66a00;
    transform:scale(1.05);
}

.search-box button:active{
    transform:scale(.96);
}

.details div{
    backdrop-filter: blur(18px);
    padding:15px;
    border-radius:15px;
    transition:.3s;
    border:1px solid rgba(255,255,255,.25);
    background: rgba(255,255,255,.28);
}

.details div:hover{
    transform:translateY(-5px);
    background:rgba(255,255,255,.28);
}

.details h3{
    font-size:15px;
    color:rgba(255,255,255,.8);
    margin-bottom:8px;
}

.details p{
    font-size:18px;
    font-weight:bold;
    margin:0;
}

#icon{
    display: block;
    margin: 0 auto;
    width: 100px;
    height: 100px;
}
    

@keyframes float{

    0%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-10px);
    }

    100%{
        transform:translateY(0);
    }

}

@media (max-width:480px){

    .weather-card{
        width:90%;
        padding:20px;
    }

    .search-box{
        width:90%;
        flex-direction:column;
    }

    .search-box input,
    .search-box button{
        width:100%;
        box-sizing:border-box;
    }

    .details{
        grid-template-columns:1fr;
    }

}

@keyframes cardAppear{
    from{
        opacity:0;
        transform:translateY(30px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes gradientMove {
    0% {
        background-position: 0% 50%;
    }
    50% {
        background-position: 100% 50%;
    }
    100% {
        background-position: 0% 50%;
    }
}
    </style>

</head> 
  
<body>
    
  <div class="container">

    <div class="search-box">
        <input type="text" placeholder="Enter city name">
        <button>Search</button>
    </div>

    <div class="weather-card">

        <h2>
    <span id="city">City</span>,
    <span id="country">Country</span>
</h2>

        <img id="icon" src="" alt="">

        <h1 id="temp">--°C</h1>

        <p id="desc">Weather</p>

        <div class="details">

            <div>
                <h3>Humidity</h3>
                <p id="humidity">--%</p>
            </div>

            <div>
                <h3>Wind</h3>
                <p id="wind">-- km/h</p>
            </div>

            <div>
    <h3>Feels Like</h3>
    <p id="feelsLike">--°C</p>
</div>

<div>
    <h3>Pressure</h3>
    <p id="pressure">-- hPa</p>
</div>

<div>
    <h3>Visibility</h3>
    <p id="visibility">-- km</p>
</div>

<div>
    <h3>Max Temp</h3>
    <p id="maxTemp">--°C</p>
</div>

<div>
    <h3>Sunrise</h3>
    <p id="sunrise">--</p>
</div>

<div>
    <h3>Sunset</h3>
    <p id="sunset">--</p>
</div>

        </div>

    </div>

</div>

<script src="./index.js"></script>
</body>
</html>
