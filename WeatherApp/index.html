<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>

  <style>
    *{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#4facfe,#00f2fe);
}

.container{
width:380px;
}

.search-box{
display:flex;
gap:10px;
margin-bottom:20px;
}

.search-box input{
flex:1;
padding:12px;
border:none;
border-radius:10px;
font-size:16px;
}

.search-box button{
padding:12px 20px;
border:none;
border-radius:10px;
cursor:pointer;
background:#0077ff;
color:white;
}

.weather-card{
background:white;
padding:25px;
border-radius:20px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,.2);
}

.weather-card img{
width:120px;
}

.details{
display:flex;
justify-content:space-around;
margin-top:20px;
}    

  </style>

</head>
<body>

  <div>
    <input>
    <button>Search</button>
  </div>
 <h2></h2>
 <h1></h1>

  <script src="./index.js"></script>
</body>
</html>
