<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App</title>

  <style>
    *{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    transition: background .8s ease, color .3s ease;
}

.weather-card{
    width:380px;
    max-width:90%;
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,.2);
    border-radius:20px;
    padding:30px;
    text-align:center;
    box-shadow:0 15px 35px rgba(0,0,0,.2);
    color:white;
    transition:.4s;
    animation:cardAppear .6s ease;
}

.weather-card:hover{
    transform:translateY(-8px);
    box-shadow:0 20px 45px rgba(0,0,0,.3);
}

.default{
    background: linear-gradient(135deg,#74ebd5,#ACB6E5);
}

.clear{
    background: linear-gradient(135deg,#f6d365,#fda085);
}

.clouds{
    background: linear-gradient(135deg,#bdc3c7,#2c3e50);
}

.rain{
    background: linear-gradient(135deg,#4b79a1,#283e51);
}

.thunderstorm{
    background: linear-gradient(135deg,#232526,#414345);
}

.snow{
    background: linear-gradient(135deg,#e6dada,#274046);
}

.mist{
    background: linear-gradient(135deg,#757f9a,#d7dde8);
}

#desc{
    color:rgba(255,255,255,.9);
    margin-bottom:20px;
    text-transform:capitalize;
    font-size:18px;
}

    .details{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:15px;
    margin-top:20px;
}

.container{
    width:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.search-box{
    width:380px;
    max-width:90%;
    display:flex;
    gap:10px;
    margin-bottom:25px;
}

.search-box input{
    flex:1;
    padding:12px 15px;
    border:none;
    outline:none;
    border-radius:30px;
    font-size:16px;
    transition:.3s;
    box-shadow:0 5px 12px rgba(0,0,0,.15);
}

.search-box input:focus{
    box-shadow:0 0 12px rgba(255,255,255,.6);
}

.search-box button{
    border:none;
    padding:12px 22px;
    border-radius:30px;
    cursor:pointer;
    background:#0077ff;
    color:white;
    font-size:16px;
    transition:.3s;
}

.search-box button:hover{
    background:#005ed6;
    transform:scale(1.05);
}

.search-box button:active{
    transform:scale(.96);
}

.details div{
    background:rgba(255,255,255,.18);
    backdrop-filter:blur(10px);
    padding:15px;
    border-radius:15px;
    transition:.3s;
}

.details div:hover{
    transform:translateY(-5px);
    background:rgba(255,255,255,.28);
}

.details h3{
    font-size:15px;
    color:rgba(255,255,255,.8);
    margin-bottom:8px;
}

.details p{
    font-size:18px;
    font-weight:bold;
    margin:0;
}

#icon{
    width:120px;
    height:120px;
    animation:float 3s ease-in-out infinite;
}

@keyframes float{

    0%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-10px);
    }

    100%{
        transform:translateY(0);
    }

}

@media (max-width:480px){

    .weather-card{
        width:90%;
        padding:20px;
    }

    .search-box{
        width:90%;
        flex-direction:column;
    }

    .search-box input,
    .search-box button{
        width:100%;
        box-sizing:border-box;
    }

    .details{
        grid-template-columns:1fr;
    }

}

@keyframes cardAppear{
    from{
        opacity:0;
        transform:translateY(30px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}
  </style>

</head>
<body>

  <div class="container">

    <div class="search-box">
        <input type="text" placeholder="Enter city name">
        <button>Search</button>
    </div>

    <div class="weather-card">

        <h2 id="city">City</h2>

        <img id="icon" src="" alt="">

        <h1 id="temp">--°C</h1>

        <p id="desc">Weather</p>

        <div class="details">

            <div>
                <h3>Humidity</h3>
                <p id="humidity">--%</p>
            </div>

            <div>
                <h3>Wind</h3>
                <p id="wind">-- km/h</p>
            </div>

            <div>
    <h3>Feels Like</h3>
    <p id="feelsLike">--°C</p>
</div>

<div>
    <h3>Pressure</h3>
    <p id="pressure">-- hPa</p>
</div>

<div>
    <h3>Visibility</h3>
    <p id="visibility">-- km</p>
</div>

<div>
    <h3>Sunrise</h3>
    <p id="sunrise">--</p>
</div>

<div>
    <h3>Sunset</h3>
    <p id="sunset">--</p>
</div>

        </div>

    </div>

</div>

<script src="./index.js"></script>
</body>
</html>
